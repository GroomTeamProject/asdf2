apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GroomTeamProject/asdf3.git
    targetRevision: manifest/service
    path: infra/k8s/overlays/prod/redis
  destination:
    server: https://kubernetes.default.svc
    namespace: team02
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
