apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GroomTeamProject/asdf3.git
    targetRevision: develop
    path: infra/k8s/overlays/prod/order-service
  destination:
    server: https://kubernetes.default.svc
    namespace: team02
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
