apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: docker.io/wsk221e/team02-order-service:latest
        ports:
        - containerPort: 8085
        envFrom:
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1024Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: team02
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
  - port: 8085
    targetPort: 8085
    protocol: TCP

