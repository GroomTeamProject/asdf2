apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: team02
  labels:
    Service: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        Service: payment-service
    spec:
      containers:
      - name: payment-service
        image: 093322228889.dkr.ecr.ap-northeast-2.amazonaws.com/team02-payment-service:latest
        ports:
        - containerPort: 8084
        envFrom:
          - configMapRef:
              name: spring-config
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
