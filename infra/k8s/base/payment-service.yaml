apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: 093322228889.dkr.ecr.ap-northeast-2.amazonaws.com/team02-payment-service:latest
        ports:
        - containerPort: 8084
        envFrom:
          - configMapRef:
              name: spring-config
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: team02
spec:
  type: ClusterIP
  selector:
    app: payment-service
  ports:
  - port: 8084
    targetPort: 8084
    protocol: TCP

