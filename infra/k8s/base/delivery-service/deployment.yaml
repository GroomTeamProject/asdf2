apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
      - name: delivery-service
        image: 093322228889.dkr.ecr.ap-northeast-2.amazonaws.com/team02-delivery-service:latest
        ports:
        - containerPort: 8087
        envFrom:
          - configMapRef:
              name: spring-config
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"


