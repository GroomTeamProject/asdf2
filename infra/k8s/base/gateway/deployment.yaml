apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: 093322228889.dkr.ecr.ap-northeast-2.amazonaws.com/team02-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
          - configMapRef:
              name: spring-config
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"



