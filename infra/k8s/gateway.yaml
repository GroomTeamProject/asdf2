apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: docker.io/wsk221e/team02-gateway:latest
        ports:
        - containerPort: 8080
        envFrom:
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: team02
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP

