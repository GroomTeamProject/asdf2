apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: team02
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: docker.io/wsk221e/team02-notification-service:latest
        ports:
        - containerPort: 8088
        envFrom:
          - configMapRef:
              name: spring-config
          - secretRef:
              name: app-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1024Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: team02
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
  - port: 8088
    targetPort: 8088
    protocol: TCP

