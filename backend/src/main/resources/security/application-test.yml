spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: ${DB_URL_TEST}
    username: ${DB_USERNAME_TEST}
    password: ${DB_PASSWORD_TEST}
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:test-access-key}
      secret-key: ${AWS_SECRET_KEY:test-secret-key}
    s3:
      bucket: ${AWS_S3_BUCKET:test-bucket}
    region:
      static: ${AWS_REGION:us-east-1}
    stack:
      auto: false
jwt:
  secret: ${JWT_SECRET_TEST}
  expiration: 3600000
