server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: false
          routes:
            - id: demo-service
              uri: ${DEMO_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/api/demo/**

            - id: owner-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/owner/**

            - id: owner-swagger
              uri: http://localhost:8081
              predicates:
                - Path=/owner/swagger-ui.html

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
