server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: false
      routes:
        - id: demo-service
          uri: ${DEMO_SERVICE_URL:http://demo-service:8090}
          predicates:
            - Path=/api/demo/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8085}
          predicates:
            - Path=/api/orders/**

        - id: review-service
          uri: ${REVIEW_SERVICE_URL:http://review-service:8086}
          predicates:
            - Path=/api/reviews/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8088}
          predicates:
            - Path=/api/notifications/**

        - id: notification-service-sse
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8088}
          predicates:
            - Path=/api/sse/**

        - id: owner-service
          uri: ${DEMO_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/owner/**

        - id: owner-swagger
          uri: ${DEMO_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/owner/swagger-ui.html

        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/users/**, /api/auth/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:lb://PAYMENT-SERVICE}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Request-Id,
            - RemoveRequestHeader=Cookie

        - id: payment-webhook
          uri: ${PAYMENT_SERVICE_INTERNAL_URL:http://payment-service:8100}
          predicates:
            - Path=/webhook/payments/**
          filters:
            - StripPrefix=1
            - AddRequestHeader=X-Request-Id,
            - RemoveRequestHeader=Cookie

# Logging
logging:
  level:
    io.goorm.team02.gateway: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.web.reactive: WARN
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
