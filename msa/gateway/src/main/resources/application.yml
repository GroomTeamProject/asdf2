server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                #allowedOrigins: "*"
                allowedOrigins: "http://localhost:5173"
                allowedMethods: "*"
                allowedHeaders: "*"
                #allowCredentials: false
                allowCredentials: true
          routes:
            - id: demo-service
              uri: ${DEMO_SERVICE_URL:http://demo-service:8090}
              predicates:
                - Path=/api/demo/**
            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://order-service:8085}
              predicates:
                - Path=/api/orders/**
            - id: review-service
              uri: ${REVIEW_SERVICE_URL:http://review-service:8086}
              predicates:
                - Path=/api/reviews/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8088}
              predicates:
                - Path=/api/notifications/**
            - id: notification-service-sse
              uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8088}
              predicates:
                - Path=/api/sse/**
            - id: owner-service
              uri: ${DEMO_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/api/owner/**
            - id: owner-swagger
              uri: ${DEMO_SERVICE_URL:http://localhost:8090}
              predicates:
                - Path=/owner/swagger-ui.html
            - id: user-service
              uri: http://msa-user:8082 #${USER_SERVICE_URL:http://msa-user:8082}
              predicates:
                - Path=/api/users/**
            - id: user-service-auth
              uri: http://msa-user:8082 #${USER_SERVICE_URL:http://msa-user:8082}
              predicates:
                - Path=/api/auth/**


# Logging
logging:
  level:
    io.goorm.team02.gateway: INFO
    org.springframework.cloud.gateway: WARN
    org.springframework.web.reactive: WARN
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
