server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: false
  config:
    import: classpath:application-routes.yml

# Logging
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
