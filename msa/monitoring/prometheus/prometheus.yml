global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: "owner-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["owner-service:8081"]

  - job_name: "user-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["user-service:8082"]

  - job_name: "order-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["order-service:8085"]

  - job_name: "review-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["review-service:8086"]

  - job_name: "delivery-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["delivery-service:8087"]

  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["notification-service:8088"]
