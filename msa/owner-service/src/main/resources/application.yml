spring:
  application:
    name: team02

# Actuator & Prometheus 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    prometheus:
      metrics:
        export:
          enabled: true
    tags:
      application: ${spring.application.name}

---

spring:
  config:
    import: classpath:security/application-local.yml
    activate:
      on-profile: local

---

spring:
  config:
    import: classpath:security/application-dev.yml
    activate:
      on-profile: dev

---

spring:
  config:
    import: classpath:security/application-prod.yml
    activate:
      on-profile: prod

---

spring:
  config:
    import: classpath:security/application-test.yml
    activate:
      on-profile: test

---

# 파일 업로드 설정
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 커스텀 설정
app:
  s3:
    folder: store

feign:
  client:
    config:
      order-service:
        connect-timeout: 5000
        read-timeout: 5000

# Rider 서비스에서 Order 서비스 API 호출용 베이스 URL
# - 기본값은 로컬 실행 시 http://localhost:8080
# - 환경별로 ORDER_SERVICE_URL 환경변수로 덮어써서 사용
order-service:
  url: ${ORDER_SERVICE_URL:http://localhost:8090}



  