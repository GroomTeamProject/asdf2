services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: msa-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: msa-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: msa-kafka-ui
    ports:
      - "9001:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  # Demo Service MariaDB
  demo-mariadb:
    image: mariadb:12.0
    container_name: msa-demo-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: team02demo
    volumes:
      - demo_mariadb_data:/var/lib/mysql

  # Demo Service
  demo-service:
    build:
      context: ./msa-demo
      dockerfile: Dockerfile
    container_name: msa-demo
    ports:
      - "8090:8090"
    env_file:
      - .env.dev
    depends_on:
      - kafka
      - demo-mariadb

  # Order Service MariaDB
  order-mariadb:
    image: mariadb:12.0
    container_name: msa-order-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: team02order
    volumes:
      - order_mariadb_data:/var/lib/mysql

  # Order Service
  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: msa-order
    ports:
      - "8085:8085"
    env_file:
      - .env.dev
    depends_on:
      - kafka
      - order-mariadb

  # API Gateway
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: msa-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    environment:
      DEMO_SERVICE_URL: http://demo-service:8090
      ORDER_SERVICE_URL: http://order-service:8085
    depends_on:
      - demo-service
      - order-service

volumes:
  demo_mariadb_data:
  order_mariadb_data:

networks:
  default:
    name: msa-network