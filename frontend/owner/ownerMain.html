<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDeliver - 점주 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-size: 14px;
        }
        html {
            font-size: var(--font-size);
        }
        
        .image-placeholder {
            @apply bg-gray-300 border border-gray-400 flex items-center justify-center;
        }
        
        .image-placeholder span {
            @apply text-gray-500 text-xs;
        }

        .tab-button {
            @apply px-4 py-2 border border-gray-400 text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors;
        }

        .tab-button.active {
            @apply bg-gray-200 border-gray-600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 0.5rem;
            border: 2px solid #9ca3af;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#030213'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <header class="bg-white border-b-2 border-gray-400 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="store" class="w-6 h-6 text-gray-600"></i>
                <h1 class="text-xl text-gray-800">점주 관리</h1>
            </div>
            <button 
                onclick="goHome()" 
                class="border border-gray-400 text-gray-700 px-3 py-1 rounded hover:bg-gray-200"
            >
                역할 변경
            </button>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <div class="max-w-6xl mx-auto p-4">
        <div class="grid grid-cols-4 gap-0 bg-white border-2 border-gray-400 rounded-lg overflow-hidden mb-6">
            <button class="tab-button active" onclick="showTab('dashboard')" id="tab-dashboard">대시보드</button>
            <button class="tab-button" onclick="showTab('orders')" id="tab-orders">주문 관리</button>
            <button class="tab-button" onclick="showTab('menu')" id="tab-menu">메뉴 관리</button>
            <button class="tab-button" onclick="showTab('restaurant')" id="tab-restaurant">가게 정보</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard-content" class="tab-content">
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="border-2 border-gray-400 bg-white rounded-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">오늘 주문</p>
                            <p id="today-orders" class="text-2xl text-gray-800">3</p>
                        </div>
                        <i data-lucide="package" class="w-8 h-8 text-gray-600"></i>
                    </div>
                </div>
                <div class="border-2 border-gray-400 bg-white rounded-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">오늘 매출</p>
                            <p id="today-revenue" class="text-2xl text-gray-800">78,000원</p>
                        </div>
                        <i data-lucide="dollar-sign" class="w-8 h-8 text-gray-600"></i>
                    </div>
                </div>
                <div class="border-2 border-gray-400 bg-white rounded-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">평점</p>
                            <p class="text-2xl text-gray-800">4.5</p>
                        </div>
                        <i data-lucide="star" class="w-8 h-8 text-gray-600"></i>
                    </div>
                </div>
                <div class="border-2 border-gray-400 bg-white rounded-lg p-6">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">총 주문</p>
                            <p class="text-2xl text-gray-800">1,248</p>
                        </div>
                        <i data-lucide="bar-chart-3" class="w-8 h-8 text-gray-600"></i>
                    </div>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="border-2 border-gray-400 bg-white rounded-lg">
                <div class="border-b border-gray-300 p-4">
                    <h2 class="text-gray-800">최근 주문</h2>
                </div>
                <div class="p-4">
                    <div id="recent-orders" class="space-y-4">
                        <!-- 최근 주문들이 여기에 동적으로 생성됩니다 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders Tab -->
        <div id="orders-content" class="tab-content hidden">
            <div class="border-2 border-gray-400 bg-white rounded-lg">
                <div class="border-b border-gray-300 p-4">
                    <h2 class="text-gray-800">주문 관리</h2>
                </div>
                <div class="p-4">
                    <div id="orders-list" class="space-y-4">
                        <!-- 주문 목록이 여기에 동적으로 생성됩니다 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu Tab -->
        <div id="menu-content" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-gray-800">메뉴 관리</h2>
                <button 
                    onclick="showAddMenuModal()"
                    class="border-2 border-gray-400 bg-gray-200 text-gray-800 hover:bg-gray-300 px-4 py-2 rounded flex items-center gap-2"
                >
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    메뉴 추가
                </button>
            </div>
            <div id="menu-list" class="grid gap-4">
                <!-- 메뉴 목록이 여기에 동적으로 생성됩니다 -->
            </div>
        </div>

        <!-- Restaurant Tab -->
        <div id="restaurant-content" class="tab-content hidden">
            <div class="border-2 border-gray-400 bg-white rounded-lg">
                <div class="border-b border-gray-300 p-4 flex items-center justify-between">
                    <h2 class="text-gray-800">가게 정보</h2>
                    <button 
                        onclick="showEditRestaurantModal()"
                        class="border border-gray-400 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded flex items-center gap-2"
                    >
                        <i data-lucide="edit" class="w-4 h-4"></i>
                        수정
                    </button>
                </div>
                <div class="p-4 space-y-4">
                    <div class="image-placeholder aspect-video w-full">
                        <span>IMAGE</span>
                    </div>
                    <div id="restaurant-info" class="grid grid-cols-2 gap-4">
                        <!-- 가게 정보가 여기에 동적으로 생성됩니다 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Menu Modal -->
    <div id="add-menu-modal" class="modal">
        <div class="modal-content">
            <div class="border-b border-gray-300 p-4">
                <h3 class="text-gray-800">새 메뉴 추가</h3>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">메뉴명</label>
                    <input 
                        id="new-menu-name" 
                        type="text" 
                        class="w-full border border-gray-400 rounded px-3 py-2 focus:outline-none focus:border-gray-600"
                    />
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">설명</label>
                    <textarea 
                        id="new-menu-description" 
                        class="w-full border border-gray-400 rounded px-3 py-2 h-20 resize-none focus:outline-none focus:border-gray-600"
                    ></textarea>
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">가격</label>
                    <input 
                        id="new-menu-price" 
                        type="number" 
                        class="w-full border border-gray-400 rounded px-3 py-2 focus:outline-none focus:border-gray-600"
                    />
                </div>
                <div>
                    <label class="block text-sm text-gray-700 mb-1">카테고리</label>
                    <select 
                        id="new-menu-category" 
                        class="w-full border border-gray-400 rounded px-3 py-2 focus:outline-none focus:border-gray-600"
                    >
                        <option value="">카테고리 선택</option>
                        <option value="치킨">치킨</option>
                        <option value="사이드">사이드</option>
                        <option value="음료">음료</option>
                    </select>
                </div>
            </div>
            <div class="border-t border-gray-300 p-4 flex justify-end gap-2">
                <button 
                    onclick="hideAddMenuModal()"
                    class="border border-gray-400 text-gray-700 px-4 py-2 rounded hover:bg-gray-200"
                >
                    취소
                </button>
                <button 
                    onclick="addNewMenu()"
                    class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700"
                >
                    추가
                </button>
            </div>
        </div>
    </div>

    <script>
        // 전역 데이터
        let orders = [
            {
                id: '1',
                customerName: '김고객',
                items: [
                    { name: '후라이드 치킨', quantity: 1, price: 18000 },
                    { name: '치킨무', quantity: 1, price: 2000 }
                ],
                total: 20000,
                status: 'pending',
                orderTime: '2024-01-15 14:30'
            },
            {
                id: '2',
                customerName: '이고객',
                items: [
                    { name: '양념 치킨', quantity: 2, price: 20000 }
                ],
                total: 40000,
                status: 'preparing',
                orderTime: '2024-01-15 14:25'
            },
            {
                id: '3',
                customerName: '박고객',
                items: [
                    { name: '후라이드 치킨', quantity: 1, price: 18000 }
                ],
                total: 18000,
                status: 'ready',
                orderTime: '2024-01-15 14:20'
            }
        ];

        let menuItems = [
            {
                id: '1',
                name: '후라이드 치킨',
                description: '바삭바삭한 클래식 후라이드',
                price: 18000,
                category: '치킨',
                available: true
            },
            {
                id: '2',
                name: '양념 치킨',
                description: '달콤매콤한 양념치킨',
                price: 20000,
                category: '치킨',
                available: true
            },
            {
                id: '3',
                name: '치킨무',
                description: '아삭한 치킨무',
                price: 2000,
                category: '사이드',
                available: false
            }
        ];

        const restaurant = {
            name: '맛있는 치킨집',
            category: '치킨',
            description: '바삭하고 맛있는 치킨 전문점',
            address: '서울시 강남구 테헤란로 123',
            phone: '02-1234-5678',
            openTime: '11:00',
            closeTime: '22:00',
            rating: 4.5,
            totalOrders: 1248
        };

        /**
         * 페이지 초기화 함수
         */
        function initializePage() {
            renderDashboard();
            renderOrders();
            renderMenu();
            renderRestaurantInfo();
            lucide.createIcons();
        }

        /**
         * 탭 전환 함수
         */
        function showTab(tabName) {
            // 모든 탭 버튼 비활성화
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 모든 탭 내용 숨기기
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });

            // 선택된 탭 버튼 활성화
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // 선택된 탭 내용 보이기
            document.getElementById(`${tabName}-content`).classList.remove('hidden');
        }

        /**
         * 대시보드 렌더링
         */
        function renderDashboard() {
            const recentOrdersContainer = document.getElementById('recent-orders');
            recentOrdersContainer.innerHTML = '';

            orders.slice(0, 3).forEach(order => {
                const orderDiv = document.createElement('div');
                orderDiv.className = 'flex items-center justify-between p-4 border-2 border-gray-300 rounded-lg';
                
                orderDiv.innerHTML = `
                    <div>
                        <p class="text-gray-800">주문 #${order.id} - ${order.customerName}</p>
                        <p class="text-sm text-gray-600">
                            ${order.items.map(item => `${item.name} x${item.quantity}`).join(', ')}
                        </p>
                        <p class="text-sm text-gray-600">${order.orderTime}</p>
                    </div>
                    <div class="text-right">
                        <span class="inline-flex px-2 py-1 text-xs rounded border border-gray-400 bg-gray-200 text-gray-800">
                            ${getStatusText(order.status)}
                        </span>
                        <p class="mt-1 text-gray-800">${order.total.toLocaleString()}원</p>
                    </div>
                `;

                recentOrdersContainer.appendChild(orderDiv);
            });
        }

        /**
         * 주문 관리 렌더링
         */
        function renderOrders() {
            const ordersContainer = document.getElementById('orders-list');
            ordersContainer.innerHTML = '';

            orders.forEach(order => {
                const orderDiv = document.createElement('div');
                orderDiv.className = 'border border-gray-400 rounded-lg p-4 bg-white';
                
                orderDiv.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3>주문 #${order.id}</h3>
                            <p class="text-sm text-gray-600">고객: ${order.customerName}</p>
                            <p class="text-sm text-gray-600">주문 시간: ${order.orderTime}</p>
                        </div>
                        <div class="text-right">
                            <span class="inline-flex px-2 py-1 text-xs rounded border border-gray-400 bg-gray-200 text-gray-800">
                                ${getStatusText(order.status)}
                            </span>
                            <p class="mt-1">${order.total.toLocaleString()}원</p>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <h4 class="mb-2">주문 내역</h4>
                        ${order.items.map(item => `
                            <div class="flex justify-between text-sm">
                                <span>${item.name} x${item.quantity}</span>
                                <span>${(item.price * item.quantity).toLocaleString()}원</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex gap-2">
                        ${getOrderActions(order)}
                    </div>
                `;

                ordersContainer.appendChild(orderDiv);
            });
        }

        /**
         * 메뉴 관리 렌더링
         */
        function renderMenu() {
            const menuContainer = document.getElementById('menu-list');
            menuContainer.innerHTML = '';

            menuItems.forEach(item => {
                const menuDiv = document.createElement('div');
                menuDiv.className = 'border-2 border-gray-400 bg-white rounded-lg';
                
                menuDiv.innerHTML = `
                    <div class="p-4">
                        <div class="flex gap-4">
                            <div class="image-placeholder w-20 h-20 flex-shrink-0">
                                <span>IMAGE</span>
                            </div>
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <h3 class="text-gray-800">${item.name}</h3>
                                    <span class="inline-flex px-2 py-1 text-xs rounded border border-gray-400 ${item.available ? 'bg-gray-200 text-gray-800' : 'bg-gray-400 text-gray-600'}">
                                        ${item.available ? '판매 중' : '품절'}
                                    </span>
                                </div>
                                <p class="text-sm text-gray-600 mb-2">${item.description}</p>
                                <p class="text-gray-800">${item.price.toLocaleString()}원</p>
                            </div>
                            <div class="flex gap-2">
                                <button
                                    onclick="toggleMenuAvailability('${item.id}')"
                                    class="border border-gray-400 text-gray-700 hover:bg-gray-200 px-3 py-1 rounded text-sm"
                                >
                                    ${item.available ? '품절 처리' : '판매 재개'}
                                </button>
                                <button class="border border-gray-400 text-gray-700 hover:bg-gray-200 p-2 rounded">
                                    <i data-lucide="edit" class="w-4 h-4"></i>
                                </button>
                                <button 
                                    onclick="deleteMenu('${item.id}')"
                                    class="border border-gray-400 text-gray-700 hover:bg-gray-200 p-2 rounded"
                                >
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;

                menuContainer.appendChild(menuDiv);
            });

            lucide.createIcons();
        }

        /**
         * 가게 정보 렌더링
         */
        function renderRestaurantInfo() {
            const infoContainer = document.getElementById('restaurant-info');
            
            infoContainer.innerHTML = `
                <div>
                    <label class="text-gray-700 text-sm block mb-1">가게명</label>
                    <p class="text-gray-800">${restaurant.name}</p>
                </div>
                <div>
                    <label class="text-gray-700 text-sm block mb-1">카테고리</label>
                    <p class="text-gray-800">${restaurant.category}</p>
                </div>
                <div class="col-span-2">
                    <label class="text-gray-700 text-sm block mb-1">설명</label>
                    <p class="text-gray-800">${restaurant.description}</p>
                </div>
                <div class="col-span-2">
                    <label class="text-gray-700 text-sm block mb-1">주소</label>
                    <p class="text-gray-800">${restaurant.address}</p>
                </div>
                <div>
                    <label class="text-gray-700 text-sm block mb-1">전화번호</label>
                    <p class="text-gray-800">${restaurant.phone}</p>
                </div>
                <div>
                    <label class="text-gray-700 text-sm block mb-1">운영시간</label>
                    <p class="text-gray-800">${restaurant.openTime} - ${restaurant.closeTime}</p>
                </div>
                <div>
                    <label class="text-gray-700 text-sm block mb-1">평점</label>
                    <p class="flex items-center gap-1 text-gray-800">
                        <i data-lucide="star" class="w-4 h-4 text-gray-600"></i>
                        ${restaurant.rating}
                    </p>
                </div>
                <div>
                    <label class="text-gray-700 text-sm block mb-1">총 주문 수</label>
                    <p class="text-gray-800">${restaurant.totalOrders}회</p>
                </div>
            `;

            lucide.createIcons();
        }

        /**
         * 유틸리티 함수들
         */
        function getStatusText(status) {
            const statusMap = {
                'pending': '주문 접수',
                'preparing': '조리 중',
                'ready': '조리 완료',
                'delivered': '배달 완료'
            };
            return statusMap[status] || status;
        }

        function getOrderActions(order) {
            if (order.status === 'pending') {
                return `<button onclick="updateOrderStatus('${order.id}', 'preparing')" class="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700">조리 시작</button>`;
            } else if (order.status === 'preparing') {
                return `<button onclick="updateOrderStatus('${order.id}', 'ready')" class="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700">조리 완료</button>`;
            } else if (order.status === 'ready') {
                return `<button onclick="updateOrderStatus('${order.id}', 'delivered')" class="bg-gray-600 text-white px-3 py-1 rounded text-sm hover:bg-gray-700">배달 시작</button>`;
            }
            return '';
        }

        function updateOrderStatus(orderId, newStatus) {
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                renderDashboard();
                renderOrders();
            }
        }

        function toggleMenuAvailability(itemId) {
            const item = menuItems.find(m => m.id === itemId);
            if (item) {
                item.available = !item.available;
                renderMenu();
            }
        }

        function deleteMenu(itemId) {
            if (confirm('이 메뉴를 삭제하시겠습니까?')) {
                menuItems = menuItems.filter(m => m.id !== itemId);
                renderMenu();
            }
        }

        /**
         * 모달 관련 함수들
         */
        function showAddMenuModal() {
            document.getElementById('add-menu-modal').classList.add('show');
        }

        function hideAddMenuModal() {
            document.getElementById('add-menu-modal').classList.remove('show');
            // 입력 필드 초기화
            document.getElementById('new-menu-name').value = '';
            document.getElementById('new-menu-description').value = '';
            document.getElementById('new-menu-price').value = '';
            document.getElementById('new-menu-category').value = '';
        }

        function addNewMenu() {
            const name = document.getElementById('new-menu-name').value.trim();
            const description = document.getElementById('new-menu-description').value.trim();
            const price = parseInt(document.getElementById('new-menu-price').value);
            const category = document.getElementById('new-menu-category').value;

            if (!name || !price || !category) {
                alert('모든 필수 항목을 입력해주세요.');
                return;
            }

            const newItem = {
                id: Date.now().toString(),
                name,
                description,
                price,
                category,
                available: true
            };

            menuItems.push(newItem);
            renderMenu();
            hideAddMenuModal();
        }

        function showEditRestaurantModal() {
            alert('가게 정보 수정 기능은 준비 중입니다.');
        }

        /**
         * 페이지 이동 함수
         */
        function goHome() {
            window.location.href = '../index.html';
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
