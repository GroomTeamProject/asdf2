<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDeliver - 고객</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-size: 14px;
        }
        html {
            font-size: var(--font-size);
        }
        
        /* 와이어프레임 이미지 플레이스홀더 */
        .image-placeholder {
            @apply bg-gray-300 border border-gray-400 flex items-center justify-center;
        }
        
        .image-placeholder span {
            @apply text-gray-500 text-xs;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#030213'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <header class="bg-white border-b-2 border-gray-400 p-4">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <h1 class="text-2xl text-gray-800">QuickDeliver</h1>
            </div>
            <div class="flex items-center gap-4">
                <button
                    onclick="goToCart()"
                    class="relative border border-gray-400 text-gray-700 px-3 py-1 rounded hover:bg-gray-200 flex items-center gap-2"
                >
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                    <span id="cart-badge" class="hidden absolute -top-2 -right-2 w-5 h-5 bg-gray-600 text-white text-xs rounded-full flex items-center justify-center">0</span>
                </button>
                <button 
                    onclick="goHome()" 
                    class="border border-gray-400 text-gray-700 px-3 py-1 rounded hover:bg-gray-200"
                >
                    역할 변경
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4">
        <!-- Search Section -->
        <div class="mb-8">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                <input
                    id="search-input"
                    type="text"
                    placeholder="음식점이나 음식을 검색해보세요"
                    class="w-full pl-10 h-12 border-2 border-gray-400 bg-white rounded-md px-3 py-2 focus:outline-none focus:border-gray-600"
                    onfocus="goToSearch()"
                />
            </div>
        </div>

        <!-- Categories -->
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors rounded-lg p-4 text-center bg-white">
                <div class="w-8 h-8 bg-gray-300 border border-gray-400 mx-auto mb-2 flex items-center justify-center">
                    <span class="text-xs text-gray-600">ICON</span>
                </div>
                <p class="text-gray-800">치킨</p>
            </div>
            <div class="cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors rounded-lg p-4 text-center bg-white">
                <div class="w-8 h-8 bg-gray-300 border border-gray-400 mx-auto mb-2 flex items-center justify-center">
                    <span class="text-xs text-gray-600">ICON</span>
                </div>
                <p class="text-gray-800">피자</p>
            </div>
            <div class="cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors rounded-lg p-4 text-center bg-white">
                <div class="w-8 h-8 bg-gray-300 border border-gray-400 mx-auto mb-2 flex items-center justify-center">
                    <span class="text-xs text-gray-600">ICON</span>
                </div>
                <p class="text-gray-800">한식</p>
            </div>
            <div class="cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors rounded-lg p-4 text-center bg-white">
                <div class="w-8 h-8 bg-gray-300 border border-gray-400 mx-auto mb-2 flex items-center justify-center">
                    <span class="text-xs text-gray-600">ICON</span>
                </div>
                <p class="text-gray-800">중식</p>
            </div>
        </div>

        <!-- Popular Restaurants -->
        <section>
            <h2 class="mb-4 text-gray-800">인기 음식점</h2>
            <div id="restaurants-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 음식점 목록이 JavaScript로 동적 생성됩니다 -->
            </div>
        </section>
    </main>

    <script>
        // 전역 데이터
        const restaurants = [
            {
                id: '1',
                name: '맛있는 치킨집',
                category: '치킨',
                rating: 4.5,
                deliveryTime: '25-35분',
                deliveryFee: 2000,
                description: '바삭하고 맛있는 치킨 전문점'
            },
            {
                id: '2',
                name: '신선한 피자',
                category: '피자',
                rating: 4.3,
                deliveryTime: '20-30분',
                deliveryFee: 1500,
                description: '신선한 재료로 만든 수제 피자'
            },
            {
                id: '3',
                name: '한식당 고향',
                category: '한식',
                rating: 4.7,
                deliveryTime: '30-40분',
                deliveryFee: 3000,
                description: '정통 한식의 맛을 그대로'
            }
        ];

        /**
         * 페이지 초기화 함수
         */
        function initializePage() {
            renderRestaurants();
            updateCartBadge();
            lucide.createIcons();
        }

        /**
         * 음식점 목록을 렌더링하는 함수
         */
        function renderRestaurants() {
            const grid = document.getElementById('restaurants-grid');
            grid.innerHTML = '';

            restaurants.forEach(restaurant => {
                const restaurantCard = createRestaurantCard(restaurant);
                grid.appendChild(restaurantCard);
            });
        }

        /**
         * 음식점 카드 요소를 생성하는 함수
         */
        function createRestaurantCard(restaurant) {
            const card = document.createElement('div');
            card.className = 'cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors bg-white rounded-lg overflow-hidden';
            card.onclick = () => goToRestaurant(restaurant.id);

            card.innerHTML = `
                <div class="image-placeholder aspect-video w-full">
                    <span>IMAGE</span>
                </div>
                <div class="p-4">
                    <h3 class="mb-2 text-gray-800">${restaurant.name}</h3>
                    <div class="flex items-center gap-2 text-sm text-gray-600 mb-2">
                        <i data-lucide="star" class="w-4 h-4 text-gray-600"></i>
                        <span>${restaurant.rating}</span>
                        <i data-lucide="clock" class="w-4 h-4 ml-2 text-gray-600"></i>
                        <span>${restaurant.deliveryTime}</span>
                    </div>
                    <p class="text-sm text-gray-600">${restaurant.description}</p>
                    <p class="text-sm mt-2 text-gray-800">배달비 ${restaurant.deliveryFee.toLocaleString()}원</p>
                </div>
            `;

            return card;
        }

        /**
         * 장바구니 배지 업데이트 함수
         */
        function updateCartBadge() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const badge = document.getElementById('cart-badge');
            const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);

            if (totalQuantity > 0) {
                badge.textContent = totalQuantity;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        /**
         * 페이지 이동 함수들
         */
        function goHome() {
            window.location.href = '../index.html';
        }

        function goToSearch() {
            window.location.href = './search.html';
        }

        function goToRestaurant(restaurantId) {
            localStorage.setItem('selectedRestaurantId', restaurantId);
            window.location.href = './restaurant.html';
        }

        function goToCart() {
            window.location.href = './cart.html';
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
