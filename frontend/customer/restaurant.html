<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDeliver - 음식점</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-size: 14px;
        }
        html {
            font-size: var(--font-size);
        }
        
        .image-placeholder {
            @apply bg-gray-300 border border-gray-400 flex items-center justify-center;
        }
        
        .image-placeholder span {
            @apply text-gray-500 text-xs;
        }

        .cart-button {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            right: 1rem;
            max-width: 72rem;
            margin: 0 auto;
            z-index: 50;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#030213'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <header class="bg-white border-b-2 border-gray-400 p-4">
        <div class="max-w-6xl mx-auto flex items-center gap-4">
            <button 
                onclick="goBack()" 
                class="border border-gray-400 text-gray-700 p-2 rounded hover:bg-gray-200 flex items-center"
            >
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>
            <h1 id="restaurant-name" class="text-gray-800"></h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4 pb-20">
        <!-- Restaurant Info -->
        <div class="mb-8">
            <div id="restaurant-image" class="image-placeholder aspect-video md:aspect-[3/1] w-full mb-4">
                <span>IMAGE</span>
            </div>
            <div id="restaurant-details" class="flex items-center gap-4 text-sm text-gray-600 mb-4">
                <!-- 음식점 정보가 여기에 동적으로 생성됩니다 -->
            </div>
            <p id="restaurant-description" class="text-gray-600"></p>
        </div>

        <!-- Menu -->
        <section>
            <h2 class="mb-4 text-gray-800">메뉴</h2>
            <div id="menu-list" class="grid gap-4">
                <!-- 메뉴 목록이 여기에 동적으로 생성됩니다 -->
            </div>
        </section>
    </main>

    <!-- Cart Button (고정 위치) -->
    <div id="cart-button" class="cart-button hidden">
        <button
            onclick="goToCart()"
            class="w-full h-12 bg-gray-600 text-white border-2 border-gray-800 hover:bg-gray-700 rounded-md transition-colors"
        >
            <span id="cart-summary">장바구니 보기</span>
        </button>
    </div>

    <script>
        // 전역 데이터
        const restaurants = [
            {
                id: '1',
                name: '맛있는 치킨집',
                category: '치킨',
                rating: 4.5,
                deliveryTime: '25-35분',
                deliveryFee: 2000,
                description: '바삭하고 맛있는 치킨 전문점'
            },
            {
                id: '2',
                name: '신선한 피자',
                category: '피자',
                rating: 4.3,
                deliveryTime: '20-30분',
                deliveryFee: 1500,
                description: '신선한 재료로 만든 수제 피자'
            },
            {
                id: '3',
                name: '한식당 고향',
                category: '한식',
                rating: 4.7,
                deliveryTime: '30-40분',
                deliveryFee: 3000,
                description: '정통 한식의 맛을 그대로'
            }
        ];

        const menuItems = [
            {
                id: '1',
                name: '후라이드 치킨',
                description: '바삭바삭한 클래식 후라이드',
                price: 18000,
                category: '치킨'
            },
            {
                id: '2',
                name: '양념 치킨',
                description: '달콤매콤한 양념치킨',
                price: 20000,
                category: '치킨'
            },
            {
                id: '3',
                name: '치킨무',
                description: '아삭한 치킨무',
                price: 2000,
                category: '사이드'
            }
        ];

        let selectedRestaurant = null;

        /**
         * 페이지 초기화 함수
         */
        function initializePage() {
            const restaurantId = localStorage.getItem('selectedRestaurantId');
            selectedRestaurant = restaurants.find(r => r.id === restaurantId);
            
            if (!selectedRestaurant) {
                alert('음식점 정보를 찾을 수 없습니다.');
                goBack();
                return;
            }

            renderRestaurantInfo();
            renderMenu();
            updateCartButton();
            lucide.createIcons();
        }

        /**
         * 음식점 정보 렌더링 함수
         */
        function renderRestaurantInfo() {
            document.getElementById('restaurant-name').textContent = selectedRestaurant.name;
            document.getElementById('restaurant-description').textContent = selectedRestaurant.description;

            const detailsContainer = document.getElementById('restaurant-details');
            detailsContainer.innerHTML = `
                <div class="flex items-center gap-1">
                    <i data-lucide="star" class="w-4 h-4 text-gray-600"></i>
                    <span>${selectedRestaurant.rating}</span>
                </div>
                <div class="flex items-center gap-1">
                    <i data-lucide="clock" class="w-4 h-4 text-gray-600"></i>
                    <span>${selectedRestaurant.deliveryTime}</span>
                </div>
                <div class="flex items-center gap-1">
                    <i data-lucide="map-pin" class="w-4 h-4 text-gray-600"></i>
                    <span>배달비 ${selectedRestaurant.deliveryFee.toLocaleString()}원</span>
                </div>
            `;
        }

        /**
         * 메뉴 목록 렌더링 함수
         */
        function renderMenu() {
            const menuContainer = document.getElementById('menu-list');
            menuContainer.innerHTML = '';

            menuItems.forEach(item => {
                const menuCard = createMenuCard(item);
                menuContainer.appendChild(menuCard);
            });
        }

        /**
         * 메뉴 카드 요소를 생성하는 함수
         */
        function createMenuCard(item) {
            const card = document.createElement('div');
            card.className = 'border-2 border-gray-400 bg-white rounded-lg';

            card.innerHTML = `
                <div class="p-4">
                    <div class="flex gap-4">
                        <div class="image-placeholder w-20 h-20 flex-shrink-0">
                            <span>IMAGE</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="mb-1 text-gray-800">${item.name}</h3>
                            <p class="text-sm text-gray-600 mb-2">${item.description}</p>
                            <p class="text-gray-800">${item.price.toLocaleString()}원</p>
                        </div>
                        <button 
                            onclick="addToCart('${item.id}')" 
                            class="border-2 border-gray-400 bg-gray-200 text-gray-800 hover:bg-gray-300 w-10 h-10 rounded flex items-center justify-center transition-colors"
                        >
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `;

            return card;
        }

        /**
         * 장바구니에 아이템 추가 함수
         */
        function addToCart(itemId) {
            const item = menuItems.find(m => m.id === itemId);
            if (!item) return;

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingItem = cart.find(cartItem => cartItem.id === itemId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartButton();

            // 간단한 피드백
            const button = event.target.closest('button');
            const originalBg = button.className;
            button.className = button.className.replace('bg-gray-200', 'bg-green-200');
            setTimeout(() => {
                button.className = originalBg;
            }, 200);
        }

        /**
         * 장바구니 버튼 업데이트 함수
         */
        function updateCartButton() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const cartButton = document.getElementById('cart-button');
            const cartSummary = document.getElementById('cart-summary');

            if (cart.length === 0) {
                cartButton.classList.add('hidden');
                return;
            }

            const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartSummary.textContent = `장바구니 보기 (${totalQuantity}개) · ${totalPrice.toLocaleString()}원`;
            cartButton.classList.remove('hidden');
        }

        /**
         * 페이지 이동 함수들
         */
        function goBack() {
            window.location.href = './index.html';
        }

        function goToCart() {
            window.location.href = './cart.html';
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
