<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDeliver - 장바구니</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-size: 14px;
        }
        html {
            font-size: var(--font-size);
        }
        
        .image-placeholder {
            @apply bg-gray-300 border border-gray-400 flex items-center justify-center;
        }
        
        .image-placeholder span {
            @apply text-gray-500 text-xs;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#030213'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <header class="bg-white border-b-2 border-gray-400 p-4">
        <div class="max-w-6xl mx-auto flex items-center gap-4">
            <button 
                onclick="goBack()" 
                class="border border-gray-400 text-gray-700 p-2 rounded hover:bg-gray-200 flex items-center"
            >
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>
            <h1 class="text-gray-800">장바구니</h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4">
        <!-- 빈 장바구니 메시지 -->
        <div id="empty-cart" class="text-center py-12 hidden">
            <i data-lucide="shopping-cart" class="w-12 h-12 mx-auto text-gray-500 mb-4"></i>
            <p class="text-gray-600">장바구니가 비어있습니다.</p>
        </div>

        <!-- 장바구니 아이템 목록 -->
        <div id="cart-items" class="space-y-4">
            <!-- 장바구니 아이템들이 여기에 동적으로 생성됩니다 -->
        </div>

        <!-- 주문 요약 및 결제 -->
        <div id="order-summary" class="hidden">
            <div class="border-2 border-gray-400 bg-white rounded-lg mt-6">
                <div class="p-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-800">총 주문 금액</span>
                        <span id="total-price" class="text-xl text-gray-800"></span>
                    </div>
                    <button 
                        onclick="placeOrder()"
                        class="w-full h-12 bg-gray-600 text-white border-2 border-gray-800 hover:bg-gray-700 rounded-md transition-colors"
                    >
                        주문하기
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * 페이지 초기화 함수
         */
        function initializePage() {
            renderCart();
            lucide.createIcons();
        }

        /**
         * 장바구니 렌더링 함수
         */
        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const emptyCartDiv = document.getElementById('empty-cart');
            const cartItemsDiv = document.getElementById('cart-items');
            const orderSummaryDiv = document.getElementById('order-summary');

            if (cart.length === 0) {
                emptyCartDiv.classList.remove('hidden');
                cartItemsDiv.innerHTML = '';
                orderSummaryDiv.classList.add('hidden');
                return;
            }

            emptyCartDiv.classList.add('hidden');
            orderSummaryDiv.classList.remove('hidden');

            // 장바구니 아이템 렌더링
            cartItemsDiv.innerHTML = '';
            cart.forEach(item => {
                const itemCard = createCartItemCard(item);
                cartItemsDiv.appendChild(itemCard);
            });

            // 총 금액 업데이트
            updateTotalPrice();
        }

        /**
         * 장바구니 아이템 카드 생성 함수
         */
        function createCartItemCard(item) {
            const card = document.createElement('div');
            card.className = 'border-2 border-gray-400 bg-white rounded-lg';

            card.innerHTML = `
                <div class="p-4">
                    <div class="flex items-center gap-4">
                        <div class="image-placeholder w-16 h-16">
                            <span>IMAGE</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="mb-1 text-gray-800">${item.name}</h3>
                            <p class="text-gray-800">${item.price.toLocaleString()}원</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button
                                onclick="updateQuantity('${item.id}', ${item.quantity - 1})"
                                class="border border-gray-400 text-gray-700 w-8 h-8 rounded flex items-center justify-center hover:bg-gray-200 transition-colors"
                            >
                                <i data-lucide="minus" class="w-4 h-4"></i>
                            </button>
                            <span class="w-8 text-center text-gray-800">${item.quantity}</span>
                            <button
                                onclick="updateQuantity('${item.id}', ${item.quantity + 1})"
                                class="border border-gray-400 text-gray-700 w-8 h-8 rounded flex items-center justify-center hover:bg-gray-200 transition-colors"
                            >
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;

            return card;
        }

        /**
         * 수량 업데이트 함수
         */
        function updateQuantity(itemId, newQuantity) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');

            if (newQuantity <= 0) {
                // 아이템 제거
                cart = cart.filter(item => item.id !== itemId);
            } else {
                // 수량 업데이트
                const item = cart.find(item => item.id === itemId);
                if (item) {
                    item.quantity = newQuantity;
                }
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
            lucide.createIcons();
        }

        /**
         * 총 금액 업데이트 함수
         */
        function updateTotalPrice() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('total-price').textContent = `${totalPrice.toLocaleString()}원`;
        }

        /**
         * 주문하기 함수
         */
        function placeOrder() {
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.length === 0) {
                alert('장바구니가 비어있습니다.');
                return;
            }

            // 간단한 주문 확인 다이얼로그
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const confirmed = confirm(`총 ${totalPrice.toLocaleString()}원을 주문하시겠습니까?`);

            if (confirmed) {
                // 주문 완료 처리
                localStorage.removeItem('cart');
                alert('주문이 완료되었습니다!');
                window.location.href = './index.html';
            }
        }

        /**
         * 페이지 이동 함수
         */
        function goBack() {
            window.location.href = './index.html';
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
