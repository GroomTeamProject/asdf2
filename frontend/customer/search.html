<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickDeliver - 검색</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        :root {
            --font-size: 14px;
        }
        html {
            font-size: var(--font-size);
        }
        
        .image-placeholder {
            @apply bg-gray-300 border border-gray-400 flex items-center justify-center;
        }
        
        .image-placeholder span {
            @apply text-gray-500 text-xs;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        foreground: '#030213'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Header -->
    <header class="bg-white border-b-2 border-gray-400 p-4">
        <div class="max-w-6xl mx-auto flex items-center gap-4">
            <button 
                onclick="goBack()" 
                class="border border-gray-400 text-gray-700 p-2 rounded hover:bg-gray-200 flex items-center"
            >
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
            </button>
            <div class="flex-1 relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-500 w-4 h-4"></i>
                <input
                    id="search-input"
                    type="text"
                    placeholder="음식점이나 음식을 검색해보세요"
                    class="w-full pl-10 border-2 border-gray-400 bg-white rounded-md h-10 px-3 py-2 focus:outline-none focus:border-gray-600"
                    oninput="performSearch()"
                />
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto p-4">
        <!-- 검색 결과 -->
        <div id="search-results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 검색 결과가 여기에 동적으로 생성됩니다 -->
        </div>
        
        <!-- 검색 결과 없음 메시지 -->
        <div id="no-results" class="text-center py-12 hidden">
            <p class="text-gray-600">검색 결과가 없습니다.</p>
        </div>

        <!-- 검색어 입력 안내 -->
        <div id="search-prompt" class="text-center py-12">
            <i data-lucide="search" class="w-12 h-12 mx-auto text-gray-500 mb-4"></i>
            <h3 class="mb-2 text-gray-800">검색어를 입력하세요</h3>
            <p class="text-gray-600">
                음식점 이름이나 음식 종류를 검색해보세요.
            </p>
        </div>
    </main>

    <script>
        // 전역 데이터 (메인 페이지와 동일)
        const restaurants = [
            {
                id: '1',
                name: '맛있는 치킨집',
                category: '치킨',
                rating: 4.5,
                deliveryTime: '25-35분',
                deliveryFee: 2000,
                description: '바삭하고 맛있는 치킨 전문점'
            },
            {
                id: '2',
                name: '신선한 피자',
                category: '피자',
                rating: 4.3,
                deliveryTime: '20-30분',
                deliveryFee: 1500,
                description: '신선한 재료로 만든 수제 피자'
            },
            {
                id: '3',
                name: '한식당 고향',
                category: '한식',
                rating: 4.7,
                deliveryTime: '30-40분',
                deliveryFee: 3000,
                description: '정통 한식의 맛을 그대로'
            }
        ];

        let searchTimeout;

        /**
         * 페이지 초기화 함수
         */
        function initializePage() {
            // 검색 입력창에 포커스
            document.getElementById('search-input').focus();
            lucide.createIcons();
        }

        /**
         * 검색 수행 함수 (디바운싱 적용)
         */
        function performSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = document.getElementById('search-input').value.trim().toLowerCase();
                
                if (query === '') {
                    showSearchPrompt();
                    return;
                }

                const filteredRestaurants = restaurants.filter(restaurant =>
                    restaurant.name.toLowerCase().includes(query) ||
                    restaurant.category.toLowerCase().includes(query)
                );

                displaySearchResults(filteredRestaurants);
            }, 300);
        }

        /**
         * 검색 결과 표시 함수
         */
        function displaySearchResults(results) {
            const resultsContainer = document.getElementById('search-results');
            const noResultsDiv = document.getElementById('no-results');
            const searchPromptDiv = document.getElementById('search-prompt');

            // 모든 상태 초기화
            resultsContainer.innerHTML = '';
            noResultsDiv.classList.add('hidden');
            searchPromptDiv.classList.add('hidden');

            if (results.length === 0) {
                noResultsDiv.classList.remove('hidden');
                return;
            }

            // 검색 결과 렌더링
            results.forEach(restaurant => {
                const restaurantCard = createRestaurantCard(restaurant);
                resultsContainer.appendChild(restaurantCard);
            });

            // 아이콘 재생성
            lucide.createIcons();
        }

        /**
         * 검색 안내 메시지 표시 함수
         */
        function showSearchPrompt() {
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('no-results').classList.add('hidden');
            document.getElementById('search-prompt').classList.remove('hidden');
            lucide.createIcons();
        }

        /**
         * 음식점 카드 요소를 생성하는 함수
         */
        function createRestaurantCard(restaurant) {
            const card = document.createElement('div');
            card.className = 'cursor-pointer border-2 border-gray-400 hover:bg-gray-200 transition-colors bg-white rounded-lg overflow-hidden';
            card.onclick = () => goToRestaurant(restaurant.id);

            card.innerHTML = `
                <div class="image-placeholder aspect-video w-full">
                    <span>IMAGE</span>
                </div>
                <div class="p-4">
                    <h3 class="mb-2 text-gray-800">${restaurant.name}</h3>
                    <div class="flex items-center gap-2 text-sm text-gray-600 mb-2">
                        <i data-lucide="star" class="w-4 h-4 text-gray-600"></i>
                        <span>${restaurant.rating}</span>
                        <i data-lucide="clock" class="w-4 h-4 ml-2 text-gray-600"></i>
                        <span>${restaurant.deliveryTime}</span>
                    </div>
                    <p class="text-sm text-gray-600">${restaurant.description}</p>
                </div>
            `;

            return card;
        }

        /**
         * 페이지 이동 함수들
         */
        function goBack() {
            window.location.href = './index.html';
        }

        function goToRestaurant(restaurantId) {
            localStorage.setItem('selectedRestaurantId', restaurantId);
            window.location.href = './restaurant.html';
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
