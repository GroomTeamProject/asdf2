    jar_source: /home/ubuntu/builds/payment-service.jar
    deploy_dir: /opt/payment-service
  - name: delivery
    jar_source: /home/ubuntu/builds/delivery-service.jar
    deploy_dir: /opt/delivery-service
  - name: order
    jar_source: /home/ubuntu/builds/order-service.jar
    deploy_dir: /opt/order-service
