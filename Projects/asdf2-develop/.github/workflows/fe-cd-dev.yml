name: (develop) Vue.js CD - Deploy 

on:
  pull_request:
    types: [closed]
    branches: [ develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/**'

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      # TODO: 빌드된 아티팩트 다운로드 문제 해결
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build application
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_DEV }}
        run: npm run build
        
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV_DEPLOY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV_DEPLOY }}
          aws-region: ap-northeast-2

      - name: Upload to S3 (Deploy)
        run: aws s3 sync frontend/dist/ s3://${{ secrets.AWS_S3_BUCKET_DEV_DEPLOY }} --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET_DEV_DEPLOY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID_DEV_DEPLOY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV_DEPLOY }}
          AWS_REGION: ap-northeast-2

      - name: Configure S3 for SPA
        run: |
          aws s3 website s3://${{ secrets.AWS_S3_BUCKET_DEV_DEPLOY }} \
            --index-document index.html \
            --error-document index.html

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID_DEV_DEPLOY }} \
            --paths "/*"