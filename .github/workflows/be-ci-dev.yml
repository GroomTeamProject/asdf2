name: Springboot CI - Build & Test (develop)

on:
  pull_request:
    branches: [ develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/team02-backend

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      contains(github.event.pull_request.changed_files, 'backend/') ||
      contains(github.event.pull_request.changed_files, '.github/workflows/')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build and test
      run: |
        cd backend
        ./gradlew build

    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: backend/build/reports/tests/test
      
          
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        platforms: linux/amd64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/team02-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
