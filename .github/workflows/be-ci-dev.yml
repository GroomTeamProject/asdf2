name: (develop) Springboot CI - Build & Test 

on:
  pull_request:
    branches: [ develop ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository_owner }}/team02-backend

jobs:
  check_backend_should_build:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            backend/**
            .github/workflows/**
      
      - name: Debug - Check changed files result
        run: |
          echo "Changed files: ${{ toJson(steps.changed-files.outputs) }}"
          echo "Should build: ${{ steps.changed-files.outputs.any_changed }}"

  build_backend:
    runs-on: ubuntu-latest
    needs: check_backend_should_build
    if: needs.check_backend_should_build.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
            
      - name: Build and test
        run: |
          cd backend
          export JWT_SECRET="${{ secrets.JWT_SECRET }}"
          ./gradlew build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test
        
            
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
            
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/team02-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
