name: "DEPRECATED - Use individual service workflows instead"

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'This workflow is deprecated'
        required: true
        default: 'Use individual service workflows instead'

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Deprecated workflow
        run: |
          echo "This workflow is deprecated. Please use individual service workflows instead."
          echo "Available workflows:"
          echo "- gateway-ci.yml"
          echo "- user-service-ci.yml"
          echo "- owner-service-ci.yml"
          echo "- order-service-ci.yml"
          echo "- review-service-ci.yml"
          echo "- notification-service-ci.yml"
          echo "- delivery-service-ci.yml"