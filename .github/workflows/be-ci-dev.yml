name: (develop) Springboot MSA CI - Build & Test

on:
  pull_request:
    branches: [init/msa-ci]

env:
  REGISTRY: docker.io

jobs:
  check_microservices_should_build:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect-changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed files
        id: changed
        uses: tj-actions/changed-files@v44
        with:
          files: |
            msa/**
            .github/workflows/**

      - name: Extract changed services
        id: detect-changed
        run: |
          echo "Changed files: ${{ steps.changed.outputs.all_changed_files }}"

          # 변경사항이 있는 서비스 목록 추출
          SERVICES=$(echo "${{ steps.changed.outputs.all_changed_files }}" \
            | tr ' ' '\n' \
            | grep -oE 'msa/[^/]+/' \
            | cut -d'/' -f2 \
            | sort -u \
            | jq -R . | jq -s .)

          echo "Detected services: $SERVICES"
          echo "services=$SERVICES" >> $GITHUB_OUTPUT

  build_microservices:
    runs-on: ubuntu-latest
    needs: check_microservices_should_build
    if: ${{ needs.check_microservices_should_build.outputs.services != '[]' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.check_microservices_should_build.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-
            ${{ runner.os }}-gradle-

      - name: Build & Test ${{ matrix.service }}
        run: |
          cd msa/${{ matrix.service }}
          ../../gradlew :${{ matrix.service }}:build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-report
          path: msa/${{ matrix.service }}/build/reports/tests/test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./msa/${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/team02-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/team02-${{ matrix.service }}:latest
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/team02-${{ matrix.service }}:latest
            type=gha
          cache-to: type=gha,mode=max
