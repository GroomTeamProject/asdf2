name: Owner Service CI - Build & Test

on:
  pull_request:
    branches:
      - manifest/service       # 최종에는 develop 브랜치로 변경
    paths:
      - "msa/owner-service/**"
      - "msa/libs/**"
      - ".github/workflows/owner-service-ci-dev.yml"

env:
  SERVICE_NAME: owner-service

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ env.SERVICE_NAME }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ env.SERVICE_NAME }}-

      - name: Build & Test owner-service
        run: |
          cd msa/${{ env.SERVICE_NAME }}
          ../gradlew :${{ env.SERVICE_NAME }}:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owner-service-test-report
          path: msa/${{ env.SERVICE_NAME }}/build/reports/tests/test


