name: "DEPRECATED - Use individual service workflows instead"

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'This workflow is deprecated'
        required: true
        default: 'Use individual service workflows instead'

jobs:
  deprecated:
    runs-on: ubuntu-latest
    steps:
      - name: Deprecated workflow
        run: |
          echo "This workflow is deprecated. Please use individual service workflows instead."
          echo "Available workflows:"
          echo "- gateway-cd-dev.yml"
          echo "- user-service-cd-dev.yml"
          echo "- owner-service-cd-dev.yml"
          echo "- order-service-cd-dev.yml"
          echo "- review-service-cd-dev.yml"
          echo "- notification-service-cd-dev.yml"
          echo "- delivery-service-cd-dev.yml"
