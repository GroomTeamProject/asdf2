name: Libs CI - Build & Test

on:
  pull_request:
    branches: [develop]
    paths:
      - "msa/libs/**"
      - ".github/workflows/**"

env:
  REGISTRY: docker.io

jobs:
  check_libs_should_build:
    runs-on: ubuntu-latest
    outputs:
      libs: ${{ steps.detect-changed.outputs.libs }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed libs
        id: detect-changed
        run: |
          echo "Changed files: ${{ github.event.pull_request.changed_files }}"

          # 모든 libs 목록
          ALL_LIBS='["common","security","kafka-client","dto"]'
          
          # libs 변경사항 확인
          LIBS_CHANGED=$(echo "${{ github.event.pull_request.changed_files }}" | grep -q "msa/libs/" && echo "true" || echo "false")
          
          if [ "$LIBS_CHANGED" = "true" ]; then
            # 개별 lib 변경사항 확인
            LIBS=$(echo "${{ github.event.pull_request.changed_files }}" \
              | tr ' ' '\n' \
              | grep -oE 'msa/libs/[^/]+/' \
              | cut -d'/' -f3 \
              | sort -u \
              | jq -R . | jq -cs .)
            
            # 변경된 lib가 없으면 모든 lib 빌드
            if [ "$LIBS" = "[]" ]; then
              LIBS=$ALL_LIBS
            fi
          else
            LIBS="[]"
          fi

          echo "Detected libs: $LIBS"
          echo "libs=$LIBS" >> $GITHUB_OUTPUT

  build_and_test:
    runs-on: ubuntu-latest
    needs: check_libs_should_build
    if: ${{ needs.check_libs_should_build.outputs.libs != '[]' }}
    strategy:
      matrix:
        lib: ${{ fromJson(needs.check_libs_should_build.outputs.libs) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-libs-${{ matrix.lib }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-libs-${{ matrix.lib }}-
            ${{ runner.os }}-gradle-

      - name: Build & Test libs:${{ matrix.lib }}
        run: |
          cd msa/libs/${{ matrix.lib }}
          ../../gradlew :libs:${{ matrix.lib }}:build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libs-${{ matrix.lib }}-test-report
          path: msa/libs/${{ matrix.lib }}/build/reports/tests/test
