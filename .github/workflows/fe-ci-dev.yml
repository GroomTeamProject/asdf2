name: Vue.js CI - Build (develop)

on:
  pull_request:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Debug - Check changed files
        run: |
          echo "Changed files: ${{ github.event.pull_request.changed_files }}"
          echo "Changed files count: ${{ github.event.pull_request.changed_files == 0 }}"
          echo "Contains frontend: ${{ contains(github.event.pull_request.changed_files, 'frontend/') }}"
          echo "Contains workflows: ${{ contains(github.event.pull_request.changed_files, '.github/workflows/') }}"
          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # - name: Run linting
      #   working-directory: ./frontend
      #   run: npm run lint

      # - name: Run tests
      #   working-directory: ./frontend
      #   run: npm run test:unit

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
