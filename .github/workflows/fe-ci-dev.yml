name: Vue.js CI - Build (develop)

on:
  pull_request:
    branches: [ develop ]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            frontend/**
            .github/workflows/**
            
      - name: Debug - Check changed files result
        run: |
          echo "Changed files: ${{ toJson(steps.changed-files.outputs) }}"
          echo "Should build: ${{ steps.changed-files.outputs.any_changed }}"

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      # - name: Run linting
      #   working-directory: ./frontend
      #   run: npm run lint

      # - name: Run tests
      #   working-directory: ./frontend
      #   run: npm run test:unit

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
