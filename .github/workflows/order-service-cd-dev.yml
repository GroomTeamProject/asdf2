name: Order Service CD - Deploy

on:
  push:
    branches:
      - manifest/service          # 최종에는 develop 브랜치로 변경
    paths:
      - "msa/order-service/**"
      - "msa/libs/**"
      - ".github/workflows/order-service-cd-dev.yml"

permissions:
  id-token: write       # OIDC → AWS AssumeRole
  contents: write       # kustomization.yaml commit용
  actions: read

env:
  AWS_REGION: ap-northeast-2
  SERVICE_NAME: order-service
  ECR_REPO: team02-order-service
  KUSTOMIZE_PATH: infra/k8s/overlays/prod/order-service
  IMAGE_REGISTRY: 093322228889.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  build-test-push-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ env.SERVICE_NAME }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ env.SERVICE_NAME }}-

      - name: Set Git SHA
        run: echo "GIT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build & Test order-service
        run: |
          cd msa/${{ env.SERVICE_NAME }}
          ../gradlew :${{ env.SERVICE_NAME }}:build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: order-service-test-report
          path: msa/${{ env.SERVICE_NAME }}/build/reports/tests/test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image to ECR
        env:
          GIT_SHA: ${{ env.GIT_SHA }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR_URI=${{ env.IMAGE_REGISTRY }}/${{ env.ECR_REPO }}:${GIT_SHA}

          echo "Building image: $ECR_URI"
          docker build -t ${ECR_URI} ./msa/${{ env.SERVICE_NAME }}

          echo "Pushing images to ECR..."
          docker push ${ECR_URI}
          docker tag ${ECR_URI} ${{ env.IMAGE_REGISTRY }}/${{ env.ECR_REPO }}:latest
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.ECR_REPO }}:latest

      # kustomization.yaml 이미지 태그 업데이트
      - name: Update kustomization.yaml with new image tag
        env:
          GIT_SHA: ${{ env.GIT_SHA }}
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

          yq -i ".images[] |= select(.name == \"${{ env.IMAGE_REGISTRY }}/${{ env.ECR_REPO }}\").newTag = \"${GIT_SHA}\"" \
              ${{ env.KUSTOMIZE_PATH }}/kustomization.yaml

      # 변경사항 커밋
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ${{ env.KUSTOMIZE_PATH }}/kustomization.yaml

          git commit -m "chore(order-service): update image tag to $GIT_SHA" || echo "No changes to commit"
          git pull origin manifest/service --rebase || true

          git push origin manifest/service || echo "No push needed"
