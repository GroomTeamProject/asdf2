name: User Service CI - Build & Test

on:
  pull_request:
    branches: ["manifest/service"]
    paths:
      - "msa/user-service/**"
      - "msa/libs/**"
      - ".github/workflows/**"
      - "infra/k8s/user-service.yaml"

env:
  AWS_REGION: ap-northeast-2
  SERVICE_NAME: user-service
  ECR_REPO: team02-user-service

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ env.SERVICE_NAME }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.SERVICE_NAME }}-
            ${{ runner.os }}-gradle-

      - name: Build & Test ${{ env.SERVICE_NAME }}
        run: |
          cd msa/${{ env.SERVICE_NAME }}
          ../gradlew :${{ env.SERVICE_NAME }}:build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SERVICE_NAME }}-test-report
          path: msa/${{ env.SERVICE_NAME }}/build/reports/tests/test
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image and push to ECR
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}

          docker build -t $ECR_URI:$IMAGE_TAG ./msa/${{ env.SERVICE_NAME }}
          docker tag $ECR_URI:$IMAGE_TAG $ECR_URI:latest
          docker push $ECR_URI:$IMAGE_TAG
          docker push $ECR_URI:latest

      - name: Update manifest image tag
        run: |
          sed -i "s|image:.*|image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:${{ github.sha }}|g" infra/k8s/user-service.yaml

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: Update user-service image tag to ${{ github.sha }}"
          branch: manifest/service

      - name: Trigger ArgoCD Sync
        run: |
          curl -k -X POST \
            -H "Authorization: Bearer ${{ secrets.ARGOCD_TOKEN }}" \
            -H "Content-Type: application/json" \
            http://a157766b00097494a9240ee5c353438e-968922374.ap-northeast-2.elb.amazonaws.com/api/v1/applications/team02-microservices/sync
      


